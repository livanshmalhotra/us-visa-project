model_selection:
  model_1:
    class: RandomForestClassifier
    module: sklearn.ensemble
    params:
      n_estimators: [50, 100]
      max_depth: [5, 10]
      min_samples_split: [2, 5]
  model_2:
    class: DecisionTreeClassifier
    module: sklearn.tree
    params:
      criterion: ["gini", "entropy"]
      max_depth: [5, 10, 15]
  model_3:
    class: XGBClassifier
    module: xgboost
    params:
      n_estimators: [50, 100]
      learning_rate: [0.1, 0.05]
      max_depth: [3, 5, 7]
